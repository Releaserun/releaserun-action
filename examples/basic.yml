# Basic stack health check — runs on every push and PR
# Fails only if a dependency is graded F (end-of-life or critical CVEs)
name: Stack Health Check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Releaserun/releaserun-action@v2
